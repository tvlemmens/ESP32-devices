# Sunton 5" ESP32-8048S050 480px X 800px Smart Screen
# https://www.aliexpress.com/item/3256804766379290.html
#
# Hardware configuration file
---

# Standaard ESP en HA instellingen 
substitutions:
  devicename: "esp32-8048s050c"
  friendly_name: CYD 5.0
  static_ip: 10.0.0.68

# Load ESP32 device defaults via common base file
packages:   # as a list
  - !include common/base.yaml

# Basis configuratie
esphome:
  name: ${devicename}
  platformio_options:
    build_flags: "-DBOARD_HAS_PSRAM"
    board_build.esp-idf.memory_type: qio_opi
    board_build.flash_mode: dio
    board_upload.maximum_ram_size: 524288

esp32:
  variant: esp32s3
  flash_size: 16MB
  framework:
    type: esp-idf
    # Required to achieve sufficient PSRAM bandwidth
    sdkconfig_options:
      COMPILER_OPTIMIZATION_SIZE: y
      CONFIG_ESP32S3_DEFAULT_CPU_FREQ_240: y
      CONFIG_ESP32S3_DATA_CACHE_64KB: y
      CONFIG_ESP32S3_DATA_CACHE_LINE_64B: y
      CONFIG_SPIRAM_FETCH_INSTRUCTIONS: y
      CONFIG_SPIRAM_RODATA: y
      CONFIG_ESPTOOLPY_FLASHSIZE_16MB: y # fix warning about 2mb found

psram:
  mode: octal
  speed: 80MHz

i2c:
  - sda: 19
    scl: 20
    scan: true

output:
  # Backlight LED
  - platform: ledc
    pin:
      number: GPIO02
    id: gpio_backlight_pwm
    frequency: 1220

light:
  - platform: monochromatic
    output: gpio_backlight_pwm
    name: Display Backlight
    icon: mdi:lightbulb-on
    id: display_backlight
    restore_mode: ALWAYS_ON

#-------------------------------------------
# Display
#-------------------------------------------
display:
  - id: main_display
    platform: mipi_rgb
    model: RPI
    dimensions:
      width: 800
      height: 480
    # rotation: 90
    color_order: RGB
    de_pin: 40
    hsync_pin: 39
    vsync_pin: 41
    pclk_pin: 42
    pclk_inverted: true
    pclk_frequency: 15MHz # needs to be at 15Mhz
    hsync_front_porch: 8
    hsync_pulse_width: 4
    hsync_back_porch: 8
    vsync_front_porch: 8
    vsync_pulse_width: 4
    vsync_back_porch: 8
    data_pins:
      red: [45, 48, 47, 21, 14]
      green: [5, 6, 7, 15, 16, 4]
      blue: [8, 3, 46, 9, 1]
    update_interval: never
    auto_clear_enabled: false


#---------------------
# Sensors
#---------------------

time:
  - platform: homeassistant
    id: ha_time
sensor:
  - platform: wifi_signal
    name: "WiFi Signal"
    id: wifi_signal_dbm
    on_value:
      then:
        - lvgl.widget.refresh: wifi_icon
        - lvgl.widget.refresh: wifi_dbm
        - lambda: |-
            ESP_LOGI("wifi", "WiFi dBm changed: %.1f", x);
    update_interval: 20s
text_sensor:
  # Weather Condition Sensors (Detected from Weather Icon)
  - platform: homeassistant
    id: weather_forecast_home_txt
    on_value:
      then:
        - lvgl.widget.refresh: w_mmrkrcnsr3qaa
    entity_id: weather.forecast_home
    internal: true


interval:
  - interval: 1s
    then:
      - lvgl.label.update:
          id: debug_overlay
          text: !lambda |-
            char buf[64];
            snprintf(buf, sizeof(buf), "WiFi: %.0f dBm", id(wifi_signal_dbm).state);
            return std::string(buf);



font:
  - file:
      type: gfonts
      family: "Roboto"
      weight: 400
      italic: false
    id: font_roboto_400_12
    size: 12
    glyphsets: [GF_Latin_Kernel]
    ignore_missing_glyphs: true
  - file:
      type: gfonts
      family: "Roboto"
      weight: 400
      italic: false
    id: font_roboto_400_14
    size: 14
    glyphsets: [GF_Latin_Kernel]
    ignore_missing_glyphs: true
  - file:
      type: gfonts
      family: "Roboto"
      weight: 400
      italic: false
    id: font_roboto_400_20
    size: 20
    glyphsets: [GF_Latin_Kernel]
    ignore_missing_glyphs: true
  - file:
      type: gfonts
      family: "Roboto"
      weight: 700
      italic: false
    id: font_roboto_700_28
    size: 28
    glyphsets: [GF_Latin_Kernel]
    ignore_missing_glyphs: true
  - file:
      type: gfonts
      family: "Roboto"
      weight: 400
      italic: false
    id: font_roboto_400_16
    size: 16
    glyphsets: [GF_Latin_Kernel]
    ignore_missing_glyphs: true
  - file: "ttf/materialdesignicons-webfont.ttf"
    id: font_material_design_icons_400_24
    size: 24
    glyphs: ["\U000F091F", "\U000F0922", "\U000F0925", "\U000F0928", "\U000F092B"]
  - file: "ttf/materialdesignicons-webfont.ttf"
    id: font_material_design_icons_400_66
    size: 66
    glyphs: ["\U000F0026", "\U000F0590", "\U000F0591", "\U000F0592", "\U000F0593", "\U000F0594", "\U000F0595", "\U000F0596", "\U000F0597", "\U000F0598", "\U000F0599", "\U000F059D", "\U000F059E", "\U000F067E", "\U000F067F"]

image:
  defaults:
    type: rgb565
    resize: 200x162
  images:
    - file: https://media.esphome.io/logo/logo.png
      id: online_img



#--------------------------
# LVGL Config
#--------------------------

lvgl:
  id: my_lvgl
  bg_color: "0xFFFFFF"

  pages:
    - id: page_0
      widgets:
        # widget:wifi_signal id:w_mmrkjmykgpvxq type:wifi_signal x:659 y:41 w:120 h:40
        - obj:
            id: w_mmrkjmykgpvxq
            bg_opa: transp
            border_width: 0
            width: 120
            x: 629
            y: 41
            height: 60
            # REQUIRED in new ESPHome: at least one dynamic property:
            hidden: !lambda |-
              return false;  
            widgets:
              -
                label:
                  id: wifi_icon
                  align: top_mid
                  height: 28
                  text: !lambda |-
                    if (id(wifi_signal_dbm).has_state()) {
                      float sig = id(wifi_signal_dbm).state;
                      if (sig >= -50) return "\U000F0928";
                      if (sig >= -60) return "\U000F0925";
                      if (sig >= -75) return "\U000F0922";
                      if (sig >= -100) return "\U000F091F";
                      return "\U000F092B";
                    }
                    return "\U000F092B";
                  text_color: "0x000000"
                  text_font: font_material_design_icons_400_24
                  width: 34
              -
                label:
                  id: wifi_dbm 
                  align: bottom_mid
                  height: 16
                  text: !lambda |-
                    if (id(wifi_signal_dbm).has_state()) {
                      return str_sprintf("%.0fdB", id(wifi_signal_dbm).state).c_str();
                    }
                    return "---dB";
                  text_align: center
                  text_color: "0x000000"
                  text_font: font_roboto_400_12
                  width: 100%
                  y: 20
        # widget:lvgl_meter id:w_mmrkpnd2gs638 type:lvgl_meter x:639 y:127 w:140 h:140 value:10 min:-10 max:50 color:"theme_auto"
        - meter:
            id: w_mmrkpnd2gs638
            bg_color: "lightgray"
            height: 140
            opa: cover
            scales:
              -
                angle_range: 270
                indicators:
                  -
                    line:
                      id: w_mmrkpnd2gs638_ind
                      color: "red"
                      r_mod: -10
                      value: 10
                      width: 4
                range_from: -10
                range_to: 50
                rotation: 135
                ticks:
                  color: "0x000000"
                  count: 11
                  length: 10
                  major:
                    color: "0x000000"
                    label_gap: 10
                    length: 15
                    stride: 2
                    width: 3
                  width: 2
            width: 140
            x: 639
            y: 127
        # widget:sensor_text id:w_mmrkr75k8kz93 type:sensor_text x:130 y:177 w:139 h:40
        - label:
            id: w_mmrkr75k8kz93
            height: 40
            opa: cover
            text: "This is some text!"
            text_align: "LEFT"
            text_color: "0x000000"
            text_font: font_roboto_400_20
            width: 139
            x: 130
            y: 177
        # widget:weather_icon id:w_mmrkrcnsr3qaa type:weather_icon x:120 y:97 w:159 h:74 size:66
        - label:
            id: w_mmrkrcnsr3qaa
            height: 74
            text: !lambda |-
              std::string ws = id(weather_forecast_home_txt).state;
              if (ws == "clear-night") return "\U000F0594";
              if (ws == "cloudy") return "\U000F0590";
              if (ws == "exceptional") return "\U000F0026";
              if (ws == "fog") return "\U000F0591";
              if (ws == "hail") return "\U000F0592";
              if (ws == "lightning") return "\U000F0593";
              if (ws == "lightning-rainy") return "\U000F067E";
              if (ws == "partlycloudy") return "\U000F0595";
              if (ws == "pouring") return "\U000F0596";
              if (ws == "rainy") return "\U000F0597";
              if (ws == "snowy") return "\U000F0598";
              if (ws == "snowy-rainy") return "\U000F067F";
              if (ws == "sunny") return "\U000F0599";
              if (ws == "windy") return "\U000F059D";
              if (ws == "windy-variant") return "\U000F059E";
              return "\U000F0599";
            text_align: center
            text_color: "0x000000"
            text_font: font_material_design_icons_400_66
            width: 159
            x: 120
            y: 97
        # widget:datetime id:w_mmrkt5hmb1767 type:datetime x:26 y:16 w:159 h:50 color:"theme_auto"
        - label:
            id: w_mmrkt5hmb1767
            height: 50
            opa: cover
            text: !lambda |-
              auto now = id(ha_time).now();
              return now.strftime("%H:%M\n%a, %b %d").c_str();
            text_align: center
            text_color: "0x000000"
            text_font: font_roboto_700_28
            width: 159
            x: 26
            y: 16
        # widget:online_image id:w_mmrkth0oxuwzd type:online_image x:39 y:379 w:120 h:40 color:"theme_auto"
        - image:
            id: w_mmrkth0oxuwzd
            angle: 0
            height: 40
            # image_recolor: "0x000000"
            # image_recolor_opa: cover
            # pivot_x: 0
            # pivot_y: 0
            src: online_img
            width: 120
            x: 39
            y: 379

        - label:
            id: debug_overlay
            x: 400
            y: 250
            text_color: "0x00FF00"
            text_font: font_roboto_400_12
            text: !lambda |-
              return "init";
